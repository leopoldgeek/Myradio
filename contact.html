<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SpaceGeek - Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #050816, #02030a);
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
}

header h1 {
    color: #7cf7ff;
    text-shadow: 0 0 10px #1b2cff;
}

/* CONTAINER */
.container {
    max-width: 650px;
    margin: auto;
    padding: 20px;
}

/* TABS */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.tab {
    padding: 10px 15px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.tab.active {
    background: #1b2cff;
}

/* FORM */
.box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(27,44,255,0.15);
}

input, select, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

textarea {
    height: 150px;
    resize: none;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #1b2cff;
    color: white;
    cursor: pointer;
    font-size: 1em;
    transition: 0.3s;
}

button:hover {
    background: #3b5bff;
    transform: scale(1.03);
}

/* STATUS */
.status {
    margin-top: 10px;
    text-align: center;
    opacity: 0.8;
}

/* BACK */
.back {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #7cf7ff;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
    <h1>📡 Contact SpaceGeek</h1>
    <p>Pose une question ou signale un problème 🚀</p>
</header>

<div class="container">

<!-- TABS -->
<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">❓ Question</div>
    <div class="tab" onclick="switchTab(1)">⚠️ Bug</div>
</div>

<!-- FORM -->
<div class="box">

<input type="text" id="name" placeholder="Ton nom">

<select id="type">
    <option value="Question SpaceGeek">❓ Question SpaceGeek</option>
    <option value="Bug site web">⚠️ Bug / problème site</option>
</select>

<textarea id="message" placeholder="Écris ton message..."></textarea>

<button onclick="sendMessage()">Envoyer 🚀</button>

<div class="status" id="status"></div>

</div>

<a class="back" href="index.html">⬅ Retour accueil</a>

</div>

<script>
/* INIT EMAILJS */
emailjs.init("odEHxm1USw0cLVPzv");

/* SWITCH TAB */
function switchTab(index) {
    let tabs = document.querySelectorAll(".tab");
    let select = document.getElementById("type");

    tabs.forEach(t => t.classList.remove("active"));
    tabs[index].classList.add("active");

    if (index === 0) {
        select.value = "Question SpaceGeek";
    } else {
        select.value = "Bug site web";
    }
}

/* SEND MESSAGE */
function sendMessage() {

    let name = document.getElementById("name").value;
    let type = document.getElementById("type").value;
    let message = document.getElementById("message").value;
    let status = document.getElementById("status");

    if (!name || !message) {
        status.innerText = "⚠️ Remplis tous les champs";
        return;
    }

    status.innerText = "📡 Transmission en cours...";

    emailjs.send("service_eoyk20n", "template_kpt7har", {
        from_name: name,
        type: type,
        message: message
    })
    .then(() => {
        status.innerText = "🚀 Message envoyé à SpaceGeek !";
        document.getElementById("message").value = "";
    })
    .catch((err) => {
        status.innerText = "❌ Erreur d'envoi";
        console.log(err);
    });
}
</script>

</body>
</html>
