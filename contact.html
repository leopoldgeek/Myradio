<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SpaceGeek Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #050816, #02030a);
    color: white;
    text-align: center;
}

h1 {
    color: #7cf7ff;
    margin-top: 20px;
}

.container {
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
}

input, select, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

textarea {
    height: 140px;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #1b2cff;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #3b5bff;
}

.status {
    margin-top: 10px;
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>📡 Contact SpaceGeek</h1>

<div class="container">

<input type="text" id="name" placeholder="Ton nom">

<select id="type">
    <option value="Question">❓ Question SpaceGeek</option>
    <option value="Bug">⚠️ Bug site web</option>
</select>

<textarea id="message" placeholder="Ton message..."></textarea>

<button onclick="sendMessage()">Envoyer 🚀</button>

<div class="status" id="status"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://tmrgvaxrmcbweywqjfco.supabase.co";
const supabaseKey = "sb_publishable_ZjsY2D72cYvJiN5MEvfr-Q_YW2eJ-94";

const supabase = createClient(supabaseUrl, supabaseKey);

async function sendMessage() {

    let name = document.getElementById("name").value;
    let type = document.getElementById("type").value;
    let message = document.getElementById("message").value;
    let status = document.getElementById("status");

    if (!name || !message) {
        status.innerText = "⚠️ Remplis tous les champs";
        return;
    }

    status.innerText = "📡 Envoi vers SpaceGeek Core...";

    const { data, error } = await supabase
        .from("messages")
        .insert([
            {
                name: name,
                type: type,
                message: message
            }
        ]);

    if (error) {
        console.log(error);
        status.innerText = "❌ Erreur d'envoi";
    } else {
        status.innerText = "🚀 Message envoyé avec succès !";
        document.getElementById("message").value = "";
    }
}

window.sendMessage = sendMessage;
</script>

</body>
</html>
